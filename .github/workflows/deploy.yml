name: Pipeline CI/CD - FastAPI a Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio a la máquina de GitHub
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Iniciar sesión en Google Cloud usando la llave secreta
    - name: Autenticarse en Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 3. Configurar las herramientas de Google Cloud (gcloud)
    - name: Configurar Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # 4. Autorizar a Docker para subir imágenes a Google Cloud
    - name: Autorizar Docker en Artifact Registry
      run: |
        gcloud auth configure-docker northamerica-northeast1-docker.pkg.dev --quiet

    # 5. Construir y subir la nueva imagen de Docker
    - name: Construir y empaquetar Imagen Docker
      run: |
        docker build -t northamerica-northeast1-docker.pkg.dev/sound-inkwell-393900/mi-repo/mi-api-docker:latest .
        docker push northamerica-northeast1-docker.pkg.dev/sound-inkwell-393900/mi-repo/mi-api-docker:latest

    # 6. Desplegar la imagen automáticamente en Cloud Run
    - name: Desplegar en Google Cloud Run
      run: |
        gcloud run deploy mi-api-serverless \
          --image northamerica-northeast1-docker.pkg.dev/sound-inkwell-393900/mi-repo/mi-api-docker:latest \
          --region northamerica-northeast1 \
          --port 8000 \
          --allow-unauthenticated \
          --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}"
